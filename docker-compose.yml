services:
  postgres:
    image: postgres:16-alpine
    container_name: rctiming-postgres
    environment:
      POSTGRES_DB: rctiming_dev
      POSTGRES_USER: rctiming
      POSTGRES_PASSWORD: rctiming
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  mailpit:
    image: axllent/mailpit:latest
    container_name: rctiming-mailpit
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

volumes:
  pgdata:
