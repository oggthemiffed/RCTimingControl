services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: rctiming
      POSTGRES_USER: rctiming
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rctiming -d rctiming"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?Set MINIO_ROOT_USER in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    restart: on-failure
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/rctiming &&
      mc anonymous set download local/rctiming
      "

  app:
    image: ghcr.io/oggthemiffed/rctimingcontrol/app:${RCTIMING_VERSION:?Set RCTIMING_VERSION in .env}
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/rctiming
      SPRING_DATASOURCE_USERNAME: rctiming
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER}
      STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      STORAGE_REGION: us-east-1
      STORAGE_BUCKET: rctiming
      STORAGE_PUBLIC_BASE_URL: ${STORAGE_PUBLIC_BASE_URL:?Set STORAGE_PUBLIC_BASE_URL in .env}
      TTS_ENDPOINT: piper:10200
      TTS_DEFAULT_VOICE: ${TTS_DEFAULT_VOICE:-en_GB-alan-medium}
      TTS_ENABLED: ${TTS_ENABLED:-true}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      piper:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health | grep -q UP || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s

  frontend:
    image: ghcr.io/oggthemiffed/rctimingcontrol/frontend:${RCTIMING_VERSION}
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-80}:80"
    depends_on:
      app:
        condition: service_healthy

  piper:
    image: rhasspy/wyoming-piper:latest
    restart: unless-stopped
    volumes:
      - piper_data:/data
    command: >
      --voice en_GB-alan-medium
      --voice en_GB-cori-high
      --voice en_US-amy-medium

  forwarder:
    image: ghcr.io/oggthemiffed/rctimingcontrol/forwarder:${RCTIMING_VERSION}
    restart: unless-stopped
    environment:
      FORWARDER_API_TOKEN: ${FORWARDER_API_TOKEN:?Set FORWARDER_API_TOKEN in .env}
      FORWARDER_DECODER_HOST: ${DECODER_HOST:?Set DECODER_HOST to your AMB decoder IP in .env}
      FORWARDER_DECODER_PORT: ${DECODER_PORT:-5100}
      FORWARDER_GRPC_HOST: app
      FORWARDER_GRPC_PORT: 9090
      FORWARDER_GRPC_PLAINTEXT: "true"
    depends_on:
      app:
        condition: service_healthy

volumes:
  pgdata:
  minio_data:
  piper_data:
