name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  test-backend:
    name: Backend tests (Java 21)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Run backend tests
        run: ./gradlew :app:test :forwarder:test -x generateJooq

  test-frontend:
    name: Frontend tests (Node 20)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Run frontend tests
        run: npm test -- --run
        working-directory: frontend

  test-e2e:
    name: E2E tests (Playwright + Docker trial stack)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy env file
        run: cp .env.example .env

      - name: Start trial stack
        run: docker compose -f docker-compose.trial.yml up -d --build || (docker compose -f docker-compose.trial.yml logs app && exit 1)
        timeout-minutes: 10

      - name: Wait for app to be healthy
        run: |
          echo "Waiting for app..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost/api/v1/about > /dev/null 2>&1; then
              echo "App is ready after ${i} attempts"
              exit 0
            fi
            sleep 5
          done
          echo "App did not become ready in time"
          docker compose -f docker-compose.trial.yml logs app
          exit 1

      - name: Run demo seed
        run: |
          echo "Running demo-seed..."
          docker compose -f docker-compose.trial.yml up --no-deps demo-seed
          echo "Seed complete"

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: frontend

      - name: Run E2E tests
        run: npm run test:e2e
        working-directory: frontend
        env:
          BASE_URL: http://localhost

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

      - name: Tear down stack
        if: always()
        run: docker compose -f docker-compose.trial.yml down -v
