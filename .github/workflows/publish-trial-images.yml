name: Publish Release Images

on:
  push:
    tags: ['v*']

jobs:
  build-and-push:
    name: Build & push Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - image: app
            dockerfile: docker/app/Dockerfile
          - image: frontend
            dockerfile: docker/frontend/Dockerfile
          - image: forwarder
            dockerfile: docker/forwarder/Dockerfile
          - image: fake-decoder
            dockerfile: docker/fake-decoder/Dockerfile
          - image: seed
            dockerfile: docker/seed/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/oggthemiffed/rctimingcontrol/${{ matrix.image }}
          tags: |
            type=semver,pattern=v{{version}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.version }}"
          body: |
            ## RCTimingControl v${{ steps.version.outputs.version }}

            ---

            ### Trial environment (demo data, fake decoder)

            **Requires:** Docker Desktop

            ```bash
            # 1. Download docker-compose.ghcr.yml and .env.example from this release
            cp .env.example .env
            # Edit .env and set: RCTIMING_VERSION=${{ github.ref_name }}
            docker compose -f docker-compose.ghcr.yml up
            ```

            Open **http://localhost** — demo credentials in [docs/trial-quickstart.md](docs/trial-quickstart.md)

            ---

            ### Production environment (real decoder, no demo data)

            **Requires:** Docker Compose v2.1+ on a Linux server on your venue LAN.

            ```bash
            # 1. Download docker-compose.production.yml and prod.env.example from this release
            cp prod.env.example .env
            # 2. Fill in every REQUIRED value in .env (passwords, JWT secret, decoder IP, etc.)
            # 3. Start
            docker compose -f docker-compose.production.yml up -d
            ```

            First-time setup after the stack is healthy:
            1. Browse to **http://your-server-ip** and create the admin account
            2. Go to **Admin → Forwarder Token**, generate a token, and paste it into `.env` as `FORWARDER_API_TOKEN`
            3. `docker compose -f docker-compose.production.yml restart forwarder`

            ---

            ### Docker images (GHCR)

            | Image | Tag |
            |-------|-----|
            | `ghcr.io/oggthemiffed/rctimingcontrol/app` | `${{ steps.version.outputs.version }}` |
            | `ghcr.io/oggthemiffed/rctimingcontrol/frontend` | `${{ steps.version.outputs.version }}` |
            | `ghcr.io/oggthemiffed/rctimingcontrol/forwarder` | `${{ steps.version.outputs.version }}` |
            | `ghcr.io/oggthemiffed/rctimingcontrol/fake-decoder` | `${{ steps.version.outputs.version }}` |
            | `ghcr.io/oggthemiffed/rctimingcontrol/seed` | `${{ steps.version.outputs.version }}` |
          files: |
            docker-compose.ghcr.yml
            .env.example
            docker-compose.production.yml
            prod.env.example
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') || startsWith(steps.version.outputs.version, '0.') }}
